<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>뀨의 상점</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Myeongjo:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#FDF8F0;--bg2:#F5EDD8;--bg3:#EDE3CC;
  --border:#D4C4A0;--border2:#C4B080;
  --text:#2C1F0E;--text2:#6B5230;--text3:#9B7D50;
  --gold:#B8860B;--gold2:#8B6508;--gold-light:#FFF3CC;
  --green:#2D6A2D;--green-light:#E8F5E8;
  --purple:#5B4FCF;--purple-light:#EEEDFE;
  --red:#B03030;--red-light:#FEE8E8;
  --blue:#1565C0;--blue-light:#E3F2FD;
  --sun:#E65100;--sun-light:#FFF3E0;
  --radius:10px;--radius-sm:6px;
  font-size:14px;
}
body{background:var(--bg);color:var(--text);font-family:'Nanum Gothic',sans-serif;min-height:100vh;}
#G{max-width:700px;margin:0 auto;padding:12px;user-select:none;}

/* HEADER */
.hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;margin-bottom:0;}
.gold-disp{font-size:17px;font-weight:800;color:var(--gold);white-space:nowrap;font-family:'Nanum Myeongjo',serif;}
.prog-wrap{flex:1;min-width:0;}
.prog-lbl{font-size:10px;color:var(--text3);margin-bottom:3px;}
.prog{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.prog-f{height:100%;background:linear-gradient(90deg,var(--gold),#E8A020);border-radius:4px;transition:width .4s ease;}
.dayl{font-size:11px;color:var(--text2);white-space:nowrap;font-weight:700;text-align:right;line-height:1.5;}
.day-sun{color:var(--sun);font-weight:800;}

/* STATUS BAR */
.sbar{display:flex;align-items:stretch;background:var(--bg3);border:1.5px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);margin-bottom:10px;overflow:hidden;}
.sbar-cell{flex:1;display:flex;align-items:center;gap:5px;padding:6px 10px;border-right:1px solid var(--border);cursor:pointer;transition:background .15s;min-width:0;}
.sbar-cell:last-child{border-right:none;}
.sbar-cell:hover{background:var(--bg2);}
.sbar-icon{font-size:14px;flex-shrink:0;}
.sbar-val{font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sbar-sub{font-size:9px;color:var(--text3);font-weight:700;white-space:nowrap;}
.sbar-mini-bar{height:3px;border-radius:2px;margin-top:2px;}

/* STATUS DRAWER */
.sdrawer{background:var(--bg);border:1.5px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);margin-top:-10px;margin-bottom:10px;overflow:hidden;transition:max-height .3s ease;}
.sdrawer-inner{padding:12px 14px;}
.sdrawer-tabs{display:flex;gap:6px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:8px;}
.sdrawer-tab{padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;cursor:pointer;color:var(--text3);transition:all .15s;}
.sdrawer-tab.on{background:var(--text);color:#fff;}
.sdrawer-tab:hover:not(.on){background:var(--bg2);}

/* SHOP STATUS CARDS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.stat-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;}
.stat-card-title{font-size:9px;font-weight:800;color:var(--text3);letter-spacing:.5px;margin-bottom:4px;text-transform:uppercase;}
.stat-card-val{font-size:18px;font-weight:800;font-family:'Nanum Myeongjo',serif;}
.stat-card-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.stat-mini-prog{height:5px;background:var(--bg3);border-radius:3px;margin-top:6px;overflow:hidden;}
.stat-mini-fill{height:100%;border-radius:3px;}
.rep-bar-wrap{margin-top:6px;}
.rep-zone{display:flex;gap:2px;margin-top:3px;}
.rep-seg{flex:1;height:5px;border-radius:2px;}

/* RAPPORT LIST */
.rapport-list{display:flex;flex-direction:column;gap:6px;}
.rapport-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);}
.rapport-row.vip{border-color:var(--gold);background:var(--gold-light);}
.rapport-row.regular{border-color:var(--green);background:var(--green-light);}
.rapport-e{font-size:22px;flex-shrink:0;}
.rapport-info{flex:1;min-width:0;}
.rapport-name{font-size:12px;font-weight:800;display:flex;align-items:center;gap:4px;}
.rapport-bar-bg{height:5px;background:var(--bg3);border-radius:3px;margin-top:4px;overflow:hidden;}
.rapport-bar-fill{height:100%;border-radius:3px;transition:width .4s;}
.rapport-grade{font-size:10px;font-weight:800;white-space:nowrap;text-align:right;flex-shrink:0;}
.quest-badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:800;background:var(--sun-light);color:var(--sun);border:1px solid #FFAB40;margin-left:3px;}

/* QUEST LIST */
.quest-list{display:flex;flex-direction:column;gap:7px;}
.quest-row{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;background:var(--bg2);}
.quest-row.active{border-color:var(--sun);background:var(--sun-light);}
.quest-row.done{border-color:var(--green);background:var(--green-light);opacity:.7;}
.quest-row.failed{border-color:var(--red);background:var(--red-light);opacity:.6;}
.quest-head{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.quest-prog-bar{height:6px;background:var(--bg3);border-radius:3px;margin-top:5px;overflow:hidden;}
.quest-prog-fill{height:100%;border-radius:3px;background:var(--sun);transition:width .4s;}

/* TABS */
.tabs{display:flex;margin-bottom:10px;border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:11px;cursor:pointer;border-right:1px solid var(--border);font-family:'Nanum Gothic',sans-serif;font-weight:700;transition:background .2s;line-height:1.3;}
.tab:last-child{border-right:none;}
.tab-active{background:var(--bg);color:var(--text);}
.tab-idle{background:var(--bg2);color:var(--text3);}
.tab-done{background:var(--green-light);color:var(--green);}
.tab-locked{opacity:.35;cursor:not-allowed;}

/* PANELS */
.panel{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.sec{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);cursor:pointer;font-size:13px;color:var(--text);font-family:'Nanum Gothic',sans-serif;font-weight:700;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--gold);background:var(--gold-light);}
.btn:active{transform:scale(.97);}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#fff;}
.btn-gold:hover{background:var(--gold2);border-color:var(--gold2);}
.btn-purple{background:var(--purple);border-color:var(--purple);color:#fff;}
.btn-purple:hover{background:#4A3FBF;}
.btn-red{background:var(--red);border-color:var(--red);color:#fff;}
.btn-red:hover{background:#8B2020;}
.btn-green{background:var(--green);border-color:var(--green);color:#fff;}
.btn-green:hover{background:#1F4F1F;}
.btn-sun{background:var(--sun);border-color:var(--sun);color:#fff;}
.btn-sun:hover{background:#BF360C;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-lg{padding:11px 24px;font-size:14px;}
.btn:disabled,.btn[disabled]{opacity:.35;cursor:not-allowed;transform:none;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:12px;}

/* ITEM GRIDS */
.igrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:8px;}
.icard{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:7px 5px;text-align:center;background:var(--bg2);}
.ie{font-size:24px;display:block;margin-bottom:2px;line-height:1.2;}
.in{font-size:10px;color:var(--text);font-weight:700;display:block;}
.is{font-size:10px;color:var(--text3);margin-top:1px;display:block;}

/* CUSTOMER */
.custcard{border:1.5px solid var(--border);border-radius:var(--radius);padding:12px;background:var(--bg2);margin-bottom:10px;}
.chead{display:flex;align-items:center;gap:10px;}
.ce{font-size:34px;line-height:1;}
.cn{font-size:14px;font-weight:800;}
.cnote{font-size:11px;color:var(--text3);margin-top:2px;}
.cbubble{background:var(--gold-light);border:1px solid var(--border2);border-radius:8px;padding:7px 11px;margin-top:8px;font-size:12px;color:var(--text2);font-style:italic;}
.offer-badge{display:inline-flex;align-items:center;gap:4px;background:var(--red-light);border:1px solid #F0B0B0;border-radius:6px;padding:3px 9px;font-size:12px;font-weight:800;color:var(--red);margin-top:6px;}

/* SHOP ITEMS */
.scard{border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px;background:var(--bg2);cursor:pointer;transition:all .15s;text-align:center;}
.scard:hover{border-color:var(--gold);}
.scard.sel{border-color:var(--purple);background:var(--purple-light);}
.scard.wanted{border-color:var(--gold);background:var(--gold-light);}
.scard.sel.wanted{border-color:var(--purple);background:var(--purple-light);}

/* BARGAIN */
.bargain-panel{background:var(--purple-light);border:1.5px solid var(--purple);border-radius:var(--radius);padding:11px;margin-top:10px;}
.pricerow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.pin{width:85px;padding:7px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'Nanum Gothic',sans-serif;font-weight:700;background:var(--bg);color:var(--text);text-align:center;}
.bm-wrap{margin-top:9px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;}
.bm-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.bm-emoji{font-size:22px;line-height:1;flex-shrink:0;}
.bm-label{font-size:11px;font-weight:800;flex:1;line-height:1.3;}
.bm-pct{font-size:14px;font-weight:800;white-space:nowrap;font-family:'Nanum Myeongjo',serif;}
.bm-bar-bg{height:11px;background:var(--bg3);border-radius:6px;overflow:hidden;position:relative;margin-bottom:3px;}
.bm-bar-fill{height:100%;border-radius:6px;transition:width .2s,background .2s;}
.bm-mark{position:absolute;top:0;height:100%;width:2px;background:rgba(0,0,0,.25);}
.bm-zones{display:flex;gap:0;margin-bottom:6px;}
.bm-zone{font-size:9px;text-align:center;color:var(--text3);font-weight:700;padding:0 2px;}
.bm-warn{padding:5px 9px;border-radius:6px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;line-height:1.4;}
.bm-ok  {background:#E8F5E8;color:#1B5E20;border:1px solid #81C784;}
.bm-low {background:#FFF8E1;color:#E65100;border:1px solid #FFB74D;}
.bm-high{background:#FFF3E0;color:#BF360C;border:1px solid #FF8A65;}
.bm-over{background:var(--red-light);color:var(--red);border:1px solid #EF9A9A;}
/* 합성 재료 뱃지 */
.craft-mat-item{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:700;background:#E8F0FE;border:1px solid #90CAF9;color:#1565C0;margin:1px;}
.craft-mat-item.miss{background:var(--red-light);border-color:#EF9A9A;color:var(--red);}

/* EXPLORE */
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.loc-card{border:2px solid var(--border);border-radius:var(--radius);padding:13px 11px;background:var(--bg2);cursor:pointer;text-align:left;transition:all .18s;position:relative;overflow:hidden;}
.loc-card:hover{border-color:var(--gold);background:var(--gold-light);transform:translateY(-2px);box-shadow:0 4px 12px rgba(184,134,11,.15);}
.loc-card.done{opacity:.5;cursor:default;transform:none;box-shadow:none;}
.loc-card.special{border-color:var(--sun);background:var(--sun-light);}
.loc-card.special:hover{border-color:var(--sun);background:#FFE0B2;}
.loc-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.loc-e{font-size:26px;line-height:1;}
.loc-name{font-size:12px;font-weight:800;}
.loc-desc{font-size:10px;color:var(--text3);margin-bottom:7px;line-height:1.5;}
.loc-drops{display:flex;flex-wrap:wrap;gap:3px;}
.loc-drop{font-size:10px;padding:2px 5px;border-radius:8px;font-weight:700;}
.loc-drop-c{background:var(--green-light);color:var(--green);}
.loc-drop-u{background:#FAEEDA;color:#7A4500;}
.loc-drop-r{background:var(--purple-light);color:var(--purple);}
.loc-drop-s{background:var(--sun-light);color:var(--sun);}
.loc-bonus-badge{position:absolute;top:6px;right:6px;font-size:9px;font-weight:800;padding:2px 5px;border-radius:6px;background:var(--purple-light);color:var(--purple);}
.time-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:16px;font-size:11px;font-weight:800;margin-bottom:12px;}
.time-am{background:#FFF8E1;color:#B8860B;border:1.5px solid #E8C840;}
.time-pm{background:#EDE8FE;color:var(--purple);border:1.5px solid var(--purple);}
.time-sun{background:var(--sun-light);color:var(--sun);border:1.5px solid #FFAB40;}
.exp-result{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:8px;}
.exp-result-hdr{font-size:10px;font-weight:800;color:var(--text3);margin-bottom:6px;}
.found-row{display:flex;flex-wrap:wrap;gap:6px;}
.found-chip{padding:4px 10px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:11px;font-weight:700;}
.found-chip.bonus{border-color:var(--purple);background:var(--purple-light);color:var(--purple);}
.found-chip.special{border-color:var(--sun);background:var(--sun-light);color:var(--sun);}

/* CRAFT - CATEGORIES */
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.cat-tab{padding:5px 12px;border:1.5px solid var(--border);border-radius:16px;font-size:11px;font-weight:700;cursor:pointer;background:var(--bg2);color:var(--text3);transition:all .15s;}
.cat-tab:hover{border-color:var(--gold);}
.cat-tab.active{background:var(--text);color:var(--bg);border-color:var(--text);}
.craft-list{display:flex;flex-direction:column;gap:8px;}
.craft-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);transition:all .15s;}
.craft-row.can{border-color:var(--green);background:var(--green-light);}
.craft-row.special-recipe{border-color:var(--sun);background:var(--sun-light);}
.craft-row.special-recipe.can{border-color:var(--sun);background:#FFE0B2;}
.craft-emoji{font-size:26px;flex-shrink:0;}
.craft-info{flex:1;min-width:0;}
.craft-name{font-size:13px;font-weight:800;display:flex;align-items:center;gap:5px;}
.craft-cost{font-size:10px;color:var(--text3);margin-top:2px;}
.craft-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px;}
.craft-price{font-size:13px;font-weight:800;color:var(--gold2);white-space:nowrap;flex-shrink:0;}
.craft-qty-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;min-width:90px;}
.craft-slider{width:80px;accent-color:var(--purple);}
.craft-qty-row{display:flex;align-items:center;gap:5px;}
.craft-qty-num{font-size:13px;font-weight:800;min-width:20px;text-align:center;}
.chip{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;background:var(--bg2);border:1px solid var(--border);font-weight:700;}
.chip-sun{background:var(--sun-light);border-color:#FFAB40;color:var(--sun);}

/* CUSTOMER QUEUE */
.qpanel{border:1.5px solid var(--border);border-radius:var(--radius);background:var(--bg2);margin-bottom:10px;overflow:hidden;}
.qpanel-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;cursor:pointer;user-select:none;transition:background .15s;}
.qpanel-hdr:hover{background:var(--bg3);}
.qpanel-hdr-left{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:800;color:var(--text2);}
.qpanel-body{padding:10px 12px;border-top:1px solid var(--border);background:var(--bg);}
.qlist{display:flex;flex-direction:column;gap:5px;}
.qrow{display:flex;align-items:center;gap:7px;padding:7px 9px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);cursor:pointer;transition:all .15s;}
.qrow:hover{border-color:var(--gold);background:var(--gold-light);}
.qrow.qrow-current{border-color:var(--purple);background:var(--purple-light);}
.qrow.qrow-done{opacity:.4;cursor:default;text-decoration:line-through;}
.qrow.qrow-preview{border-color:var(--gold);background:var(--gold-light);}
.qrow-e{font-size:20px;flex-shrink:0;}
.qrow-info{flex:1;min-width:0;}
.qrow-name{font-size:11px;font-weight:800;}
.qrow-tags{font-size:10px;color:var(--text3);}
.qrow-match{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px;}
.qrow-status{font-size:10px;font-weight:700;flex-shrink:0;}
.status-wait{color:var(--text3);}
.status-cur{color:var(--purple);}
.preview-panel{background:var(--gold-light);border:1.5px solid var(--border2);border-radius:var(--radius);padding:11px;margin-bottom:10px;}
.preview-items{display:flex;flex-wrap:wrap;gap:5px;}
.preview-item{padding:4px 8px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);font-size:11px;font-weight:700;background:#fff8e8;display:flex;align-items:center;gap:3px;}
.preview-item.best{border-color:var(--gold);}

/* DAY REPORT (영업 종료 리포트) */
.report-panel{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
.report-title{font-size:14px;font-weight:800;margin-bottom:12px;font-family:'Nanum Myeongjo',serif;display:flex;align-items:center;gap:6px;}
.report-section{margin-bottom:12px;}
.report-sec-title{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:.6px;margin-bottom:7px;text-transform:uppercase;}
.cust-recap-row{display:flex;align-items:center;gap:7px;padding:6px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);margin-bottom:4px;font-size:11px;}
.cust-recap-e{font-size:18px;}
.tag-need{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;background:var(--purple-light);color:var(--purple);margin:1px;}
.hint-row{display:flex;align-items:flex-start;gap:7px;padding:7px 10px;background:var(--gold-light);border:1px solid var(--border2);border-radius:var(--radius-sm);margin-bottom:4px;font-size:11px;line-height:1.5;}
.hint-icon{font-size:16px;flex-shrink:0;}
.reservation-row{display:flex;align-items:center;gap:7px;padding:7px 10px;background:#E3F2FD;border:1px solid #90CAF9;border-radius:var(--radius-sm);margin-bottom:4px;font-size:11px;}

/* SUNDAY SPECIAL */
.sunday-banner{background:linear-gradient(135deg,var(--sun-light),#FFF3CC);border:2px solid #FFAB40;border-radius:var(--radius);padding:14px;text-align:center;margin-bottom:10px;}
.sunday-title{font-size:18px;font-weight:800;color:var(--sun);font-family:'Nanum Myeongjo',serif;margin-bottom:4px;}
.discovery-card{border:2px solid var(--sun);border-radius:var(--radius);padding:12px;background:var(--sun-light);margin-bottom:8px;}

/* MISC */
.empty{font-size:12px;color:var(--text3);text-align:center;padding:16px;}
.bot{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.end-btn-wrap{background:var(--bg2);border-top:1.5px solid var(--border);padding:11px;margin:-14px -14px -14px;border-radius:0 0 var(--radius) var(--radius);margin-top:11px;display:flex;justify-content:flex-end;gap:7px;}
.log{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:11px;}
.logitem{padding:4px 0;font-size:11px;color:var(--text);border-bottom:1px solid var(--border);line-height:1.5;}
.logitem:last-child{border-bottom:none;}
.over{text-align:center;padding:32px 16px;}

// 일요일 최대 예약 손님 수
const MAX_SUN_RESERVATIONS=3;

// 손님 인스턴스 생성 — 아키타입에서 이름 뽑기
// usedNames: 오늘 이미 뽑힌 이름 Set (중복 방지)
function makeCust(archetype, usedNames){
  const available=archetype.names.filter(n=>!usedNames.has(n));
  const pool=available.length>0?available:archetype.names; // 다 쓰면 재사용
  const name=pool[Math.floor(Math.random()*pool.length)];
  usedNames.add(name);
  return {
    e:archetype.e,
    n:name,
    note:archetype.note,
    wantTags:archetype.wantTags,
    bud:archetype.bud,
    budMax:archetype.budMax,
    char:archetype.char,
    archetypeIdx:CUST_ARCHETYPES.indexOf(archetype),
  };
}

// 단골 드로어에서 CUSTS 참조 대신 아키타입 기반으로 조회
// rapport 키 = 이름 (그대로 유지)
function getCustByName(name){
  for(const arch of CUST_ARCHETYPES){
    if(arch.names.includes(name)){
      return {e:arch.e,n:name,note:arch.note,wantTags:arch.wantTags,bud:arch.bud,budMax:arch.budMax,char:arch.char};
    }
  }
  return null;
}

// 예약용 — 아키타입 인덱스 기반
function makeCustFromArchIdx(idx){
  const arch=CUST_ARCHETYPES[idx];
  return makeCust(arch,new Set());

// 합성 레시피 재료 체크: 일반 재료(ingInv) + 완성품(shopInv) 모두 만족해야 함
function canCraftCompound(r,inv,shopInv,n=1){
  const rawOk=Object.entries(r.cost||{}).every(([id,q])=>(inv[id]||0)>=q*n);
  const craftedOk=Object.entries(r.craftedCost||{}).every(([id,q])=>{
    const have=shopInv.filter(s=>s.id===id).length;
    return have>=q*n;
  });
  return rawOk&&craftedOk;
}
function canCraft(r,inv,n=1){
  if(r.craftedCost)return canCraftCompound(r,inv,S.shopInv,n);
  return Object.entries(r.cost).every(([id,q])=>(inv[id]||0)>=q*n);
}
function maxCraftableCompound(r,inv,shopInv){
  const rawMax=Object.keys(r.cost||{}).length===0?99:
    Math.min(...Object.entries(r.cost).map(([id,q])=>Math.floor((inv[id]||0)/q)));
  const cMax=Object.keys(r.craftedCost||{}).length===0?99:
    Math.min(...Object.entries(r.craftedCost).map(([id,q])=>{
      return Math.floor(shopInv.filter(s=>s.id===id).length/q);
    }));
  return Math.min(rawMax,cMax);
}
function maxCraftable(r,inv){
  if(r.craftedCost)return maxCraftableCompound(r,inv,S.shopInv);
  if(!Object.keys(r.cost).length)return 0;
  return Math.min(...Object.entries(r.cost).map(([id,q])=>Math.floor((inv[id]||0)/q)));
}
function costStr(r,n=1){
  const rawParts=Object.entries(r.cost||{}).map(([id,q])=>{
    const i=byId(INGR,id);return i?`${i.e}${i.n}×${q*n}`:null;
  }).filter(Boolean);
  const craftedParts=Object.entries(r.craftedCost||{}).map(([id,q])=>{
    const ri=byId(allRecipes(),id);return ri?`[${ri.e}${ri.n}]×${q*n}`:null;
  }).filter(Boolean);
  return [...rawParts,...craftedParts].join(' + ')||'재료 없음';
}

function maybeGenerateQuest(cust){
  if(S.activeQuests.some(q=>q.custName===cust.n&&q.status==='active'))return;
  const candidates=allRecipes().filter(r=>r.tags.some(t=>cust.wantTags.includes(t)));
  if(!candidates.length)return;
  const r=candidates[Math.floor(Math.random()*candidates.length)];
  const qty=1+Math.floor(Math.random()*3);
  const reward=Math.round(r.p*qty*1.4);
  const deadline=S.day+4+Math.floor(Math.random()*3);
  S.activeQuests.push({
    id:`q_${Date.now()}`,custName:cust.n,custE:cust.e,
    itemId:r.id,itemE:r.e,itemN:r.n,
    qty,delivered:0,deadline,reward,status:'active',
  });
  log(`📜 ${cust.e}${cust.n}의 의뢰! "${r.n}" ${qty}개를 ${deadline}일 전까지 — 보상: ${reward}G`);
}

function deliverQuest(qid){
  const q=S.activeQuests.find(x=>x.id===qid);
  if(!q||q.status!=='active')return;
  const have=S.shopInv.filter(i=>i.id===q.itemId).length;
  const canDeliver=Math.min(have,q.qty-q.delivered);
  if(canDeliver<=0){log('⚠️ 납품할 아이템이 없습니다!');render();return;}
  let rem=canDeliver;
  S.shopInv=S.shopInv.filter(i=>{if(i.id===q.itemId&&rem>0){rem--;return false;}return true;});
  q.delivered+=canDeliver;
  if(q.delivered>=q.qty){
    q.status='done';
    S.gold+=q.reward;
    S.totalRevenue+=q.reward;
    S.todayRevenue+=q.reward;
    S.weeklyRevenue+=q.reward;
    changeRapport(q.custName,15);
    changeRep(3);
    log(`✅ ${q.custE}${q.custName} 의뢰 완료! +${q.reward}G 보상!`);
  } else {
    log(`📦 ${canDeliver}개 납품 (${q.delivered}/${q.qty})`);
  }
  render();
}

function checkQuestDeadlines(){
  S.activeQuests.forEach(q=>{
    if(q.status==='active'&&S.day>q.deadline){
      q.status='failed';
      changeRapport(q.custName,-10);
      changeRep(-5);
      log(`❌ ${q.custE}${q.custName} 의뢰 실패... 친밀도 감소`);
    }
  });
}

// ===== 탐험 =====
function pickWeighted(pool){
  const entries=pool.map(id=>{const idx=INGR.findIndex(i=>i.id===id);return{id,ing:INGR[idx],w:idx>=0?IW[idx]:10};}).filter(e=>e.ing&&e.w>0);
  const total=entries.reduce((a,e)=>a+e.w,0);
  let r=Math.random()*total,acc=0;
  for(const e of entries){acc+=e.w;if(r<acc)return e.ing;}
  return entries[entries.length-1].ing;
}

// 새벽/저녁 전용: 희귀 아이템 가중치 3배
function pickWeightedBoosted(pool){
  const entries=pool.map(id=>{
    const idx=INGR.findIndex(i=>i.id===id);
    const ing=INGR[idx];
    if(!ing||IW[idx]===0)return null;
    const w=IW[idx]*(ing.r===2?3:ing.r===1?1.8:1);
    return{id,ing,w};
  }).filter(Boolean);
  const total=entries.reduce((a,e)=>a+e.w,0);
  let r=Math.random()*total,acc=0;
  for(const e of entries){acc+=e.w;if(r<acc)return e.ing;}
  return entries[entries.length-1].ing;
}

function doExplore(locId,slotIdx){
  const sun=isSunday(S.day);
  const maxSlots=sun?4:(S.bonusExplore?3:2);
  if(S.exploredSlots.length>=maxSlots){log('⚠️ 오늘 탐험 횟수를 모두 사용했습니다!');render();return;}
  if(S.exploredSlots.some(s=>s.slot===slotIdx)){log('⚠️ 이미 탐험한 시간대입니다!');render();return;}

  const locs=sun?[...LOCATIONS,...SUN_LOCATIONS]:LOCATIONS;
  const loc=locs.find(l=>l.id===locId);
  if(!loc)return;

  // 새벽/저녁 판별
  const isDawn=sun&&slotIdx===0;
  const isEve=(sun&&slotIdx===3)||(!sun&&slotIdx===2);
  const isSpecialTime=isDawn||isEve;

  const found=[],foundMap={};
  const slotInfo=getSlotInfo(slotIdx,sun);
  const bonus=getSlotBonus(loc,slotIdx,sun);

  // 특수 시간대: 드랍 종류 +1~2개, 부스트 픽
  const numTypes=isSpecialTime?(4+Math.floor(Math.random()*3)):(3+Math.floor(Math.random()*3));
  const picker=isSpecialTime?pickWeightedBoosted:pickWeighted;

  for(let i=0;i<numTypes;i++){
    const ing=picker(loc.pool);
    const qty=ing.dropMin+Math.floor(Math.random()*(ing.dropMax-ing.dropMin+1));
    S.ingInv[ing.id]=(S.ingInv[ing.id]||0)+qty;
    if(foundMap[ing.id])foundMap[ing.id].qty+=qty;
    else{foundMap[ing.id]={...ing,qty};found.push(foundMap[ing.id]);}
  }

  // 시간대 보너스 아이템
  const bonusId=bonus.ids[Math.floor(Math.random()*bonus.ids.length)];
  const bonusIng=INGR.find(i=>i.id===bonusId);
  if(bonusIng){
    const[qMin,qMax]=bonus.qty;
    const bqty=qMin+Math.floor(Math.random()*(qMax-qMin+1));
    S.ingInv[bonusIng.id]=(S.ingInv[bonusIng.id]||0)+bqty;
    if(foundMap[bonusIng.id])foundMap[bonusIng.id].qty+=bqty;
    else{foundMap[bonusIng.id]={...bonusIng,qty:bqty,isBonus:true};found.push(foundMap[bonusIng.id]);}
  }

  // 새벽 전용: 새벽이슬 드랍 (확률 70%)
  if(isDawn&&Math.random()<0.70){
    const ddi=INGR.find(i=>i.id==='dawndew');
    if(ddi){
      const qty=1+Math.floor(Math.random()*2);
      S.ingInv['dawndew']=(S.ingInv['dawndew']||0)+qty;
      if(foundMap['dawndew'])foundMap['dawndew'].qty+=qty;
      else{foundMap['dawndew']={...ddi,qty,isSpecialDrop:true};found.push(foundMap['dawndew']);}
    }
  }

  // 저녁 전용: 황혼석 드랍 (확률 70%)
  if(isEve&&Math.random()<0.70){
    const twi=INGR.find(i=>i.id==='twilight');
    if(twi){
      const qty=1+Math.floor(Math.random()*2);
      S.ingInv['twilight']=(S.ingInv['twilight']||0)+qty;
      if(foundMap['twilight'])foundMap['twilight'].qty+=qty;
      else{foundMap['twilight']={...twi,qty,isSpecialDrop:true};found.push(foundMap['twilight']);}
    }
  }

  // 일요일 특별 장소: 레시피 발견
  let discovery=null;
  if(loc.special&&Math.random()<0.55){
    const notYet=SPECIAL_RECIPES.filter(r=>!unlockedSpecial.has(r.id));
    if(notYet.length>0){
      const r=notYet[Math.floor(Math.random()*notYet.length)];
      unlockedSpecial.add(r.id);
      discovery={type:'recipe',recipe:r};
      S.sunDiscoveries.push(discovery);
      log(`🌟 특별 레시피 발견! "${r.n}" 제조법을 익혔어요!`);
    }
  }

  S.exploredSlots.push({slot:slotIdx,locId,found,discovery});
  const specialMsg=isSpecialTime?` ✨특수시간 드랍 보너스!`:'';
  log(`${slotInfo.label} ${loc.e}${loc.n} 완료!${specialMsg} `+found.map(i=>`${i.e}${i.n}×${i.qty}`).join(', '));
  render();
}

// ===== 제조 =====
function setCraftQty(id,v){S.craftQty[id]=parseInt(v)||1;render();}
function doCraft(id){
  const r=byId(allRecipes(),id);
  const qty=Math.max(1,S.craftQty[id]||1);
  if(!canCraft(r,S.ingInv,qty)){log('⚠️ 재료가 부족합니다!');render();return;}
  // 일반 재료 차감
  Object.entries(r.cost||{}).forEach(([cid,q])=>{S.ingInv[cid]-=q*qty;});
  // 합성 재료(완성품) 차감 — shopInv에서 제거
  if(r.craftedCost){
    Object.entries(r.craftedCost).forEach(([cid,q])=>{
      let need=q*qty;
      S.shopInv=S.shopInv.filter(s=>{
        if(s.id===cid&&need>0){need--;return false;}
        return true;
      });
    });
  }
  for(let i=0;i<qty;i++)S.shopInv.push({...r,uid:mkUid()});
  delete S.craftQty[id];
  const compound=!!r.craftedCost;
  log(`${compound?'🔗':'✅'} ${r.e}${r.n} ×${qty} ${compound?'합성':'제조'} 완료!`);
  render();
}

// ===== 상점 =====
function generateCustQueue(forReservation=false){
  if(forReservation){
    return S.todayReservations.map(rv=>rv.cust);
  }
  const lvInfo=getShopLevel();
  const base=lvInfo.maxQueue-2+Math.floor(Math.random()*3); // 레벨별 손님 수
  const total=Math.min(base,S.shopInv.length+2);
  const usedNames=new Set();
  const q=[];
  // 아키타입 풀을 섞어서 중복 없이 뽑기
  const shuffled=[...CUST_ARCHETYPES].sort(()=>Math.random()-.5);
  for(let i=0;i<total;i++){
    const arch=shuffled[i%shuffled.length];
    q.push(makeCust(arch,usedNames));
  }
  return q;
}

function generateTomorrowHints(){
  if(isSunday(S.day+1)){
    S.tomorrowHints=[{type:'sunday',msg:'내일은 일요일! 상점은 닫지만 예약 손님만 받아요. 탐험을 4번 갈 수 있어요.'}];
    return;
  }
  const usedNames=new Set();
  const cnt=4+Math.floor(Math.random()*3);
  const shuffled=[...CUST_ARCHETYPES].sort(()=>Math.random()-.5);
  const nextQ=[];
  for(let i=0;i<cnt;i++){
    const arch=shuffled[i%shuffled.length];
    nextQ.push(makeCust(arch,usedNames));
  }
  S.tomorrowHints=nextQ.map(c=>({type:'cust',cust:c}));
  const nextRes=S.reservations.filter(r=>r.day===S.day+1);
  nextRes.forEach(r=>S.tomorrowHints.push({type:'reservation',cust:r.cust}));
}

// ===== 트렌드 시스템 =====
// 오늘의 트렌드: 매일 변하는 수요 태그 (1~2개 HOT)
// 주간 트렌드: 7일 주기로 갱신되는 태그 (더 강한 보정)
const ALL_TAGS=['전투','마법','회복','음식','음료','일상','선물','농업','희귀','전설'];

function getTodayTrend(day){
  // 날짜 시드로 결정론적 랜덤 (같은 날은 항상 같은 트렌드)
  const seed=(day*31+7)%ALL_TAGS.length;
  const seed2=(day*17+3)%ALL_TAGS.length;
  const hot=[ALL_TAGS[seed]];
  if(seed!==seed2)hot.push(ALL_TAGS[seed2]);
  const cold=ALL_TAGS.filter(t=>!hot.includes(t))
    .slice(0,(day*13+5)%3+1);
  return {hot,cold};
}

function getWeeklyTrend(day){
  const week=Math.floor((day-1)/7);
  const seed1=(week*41+11)%ALL_TAGS.length;
  const seed2=(week*23+7)%ALL_TAGS.length;
  const tags=[ALL_TAGS[seed1]];
  if(seed1!==seed2)tags.push(ALL_TAGS[seed2]);
  return tags;
}

function getTrendBonus(tags){
  // 트렌드 태그가 포함된 레시피들 추천
  return allRecipes().filter(r=>r.tags.some(t=>tags.includes(t))).slice(0,4);
}

function openShop(){
  const sun=isSunday(S.day);
  if(!sun&&S.bonusExplore){log('⚠️ 오늘은 추가 탐험을 선택해서 상점을 열 수 없어요.');render();return;}
  if(sun){
    // 일요일: 예약 손님만 허용
    if(S.todayReservations.length===0){log('📅 일요일이라 일반 영업은 없어요. 예약 손님도 없네요.');render();return;}
    S.phase='shop';S.phase2='shop';
    S.custQueue=generateCustQueue(true);
    S.maxCusts=S.custQueue.length;
  } else {
    if(S.shopInv.length===0){log('⚠️ 판매할 상품이 없습니다!');render();return;}
    S.phase='shop';S.phase2='shop';
    S.custQueue=generateCustQueue();
    // 예약 손님 맨 앞에 추가
    const res=S.todayReservations.map(r=>r.cust);
    S.custQueue=[...res,...S.custQueue];
    S.maxCusts=S.custQueue.length;
  }
  S.doneIdxs=new Set();S.queueOpen=true;S.previewIdx=null;S.todaySalesLog=[];
  log(`🏪 상점 오픈! 오늘 손님 ${S.maxCusts}명`);
  spawnCust();
}

function spawnCust(){
  S.selUid=null;S.priceVal='';S.custOffer=0;S.previewIdx=null;
  let nextIdx=-1;
  for(let i=0;i<S.custQueue.length;i++){if(!S.doneIdxs.has(i)){nextIdx=i;break;}}
  if(nextIdx===-1||S.shopInv.length===0){
    S.cust=null;S.custsDone=S.doneIdxs.size;
    log(nextIdx===-1?'🌙 오늘 손님이 모두 다녀갔어요.':'🌙 진열 상품 소진.');
    // 영업 종료 → 힌트 생성 & 리포트 표시
    generateTomorrowHints();
    S.showDayReport=true;
    render();return;
  }
  S.custCurIdx=nextIdx;S.cust=S.custQueue[nextIdx];S.custsDone=S.doneIdxs.size;
  S.wholesaleOffer=generateWholesaleOffer(S.cust); // 도매 손님이면 자동 제안 생성
  const wanted=getCustWants(S.cust,S.shopInv);
  const hint=S.wholesaleOffer
    ?`"${S.wholesaleOffer.items.length}개 묶음으로 사고 싶어요. 싸게 해주실 수 있나요?"`
    :wanted.length>0?`"${wanted[Math.floor(Math.random()*wanted.length)].n} 있나요?"`:'\"뭔가 좋은 거 없나요?\"';
  log(`${S.cust.e} ${S.cust.n}이(가) 들어왔어요. ${hint}`);
  render();
}

function jumpToCust(idx){
  if(S.doneIdxs.has(idx)||idx===S.custCurIdx)return;
  log(`${S.custQueue[idx].e}${S.custQueue[idx].n}을(를) 먼저 응대합니다.`);
  S.selUid=null;S.priceVal='';S.custOffer=0;S.previewIdx=null;
  S.custCurIdx=idx;S.cust=S.custQueue[idx];S.custsDone=S.doneIdxs.size;
  S.wholesaleOffer=generateWholesaleOffer(S.cust);
  render();
}
function toggleQueue(){S.queueOpen=!S.queueOpen;render();}
function setPreview(idx){S.previewIdx=(S.previewIdx===idx)?null:idx;render();}

// 오늘 대기 손님 중 가장 많이 쓸 손님 인덱스
function getBigSpender(){
  const active=S.custQueue.map((c,i)=>({c,i})).filter(({i})=>!S.doneIdxs.has(i));
  if(!active.length)return -1;
  let bestIdx=-1,bestVal=0;
  active.forEach(({c,i})=>{
    const total=S.shopInv.reduce((sum,item)=>{
      const r=byId(allRecipes(),item.id);
      const isW=r&&r.tags&&r.tags.some(t=>c.wantTags.includes(t));
      return sum+Math.round(item.p*(isW?c.budMax:c.bud));
    },0);
    if(total>bestVal){bestVal=total;bestIdx=i;}
  });
  return bestIdx;
}

// 재고 아이템을 id 기준으로 묶어 반환 { id, e, n, p, count, uids }
function getStackedInv(){
  const map={};
  S.shopInv.forEach(item=>{
    if(!map[item.id])map[item.id]={...item,count:0,uids:[]};
    map[item.id].count++;
    map[item.id].uids.push(item.uid);
  });
  return Object.values(map);
}

// 도매 카트 수량 조정
function setWholesaleQty(itemId,delta){
  if(!S.wholesaleOffer)return;
  const max=S.shopInv.filter(i=>i.id===itemId).length;
  const cur=S.wholesaleOffer.cart[itemId]||0;
  const next=Math.max(0,Math.min(max,cur+delta));
  if(next===0)delete S.wholesaleOffer.cart[itemId];
  else S.wholesaleOffer.cart[itemId]=next;
  render();
}

// 도매 합계 계산
function getWholesaleTotal(){
  if(!S.wholesaleOffer)return 0;
  const {rate,cart}=S.wholesaleOffer;
  return Object.entries(cart).reduce((sum,[id,qty])=>{
    const item=S.shopInv.find(i=>i.id===id);
    return item?sum+Math.round(item.p*rate)*qty:sum;
  },0);
}

// 도매 제안 생성 (bud < 1.0 손님)
function generateWholesaleOffer(cust){
  if(!cust||cust.bud>=1.0||S.shopInv.length<2)return null;
  const wanted=getCustWants(cust,S.shopInv);
  const wantedIds=[...new Set(wanted.map(i=>i.id))];
  const allIds=[...new Set(S.shopInv.map(i=>i.id))];
  const ordered=[...wantedIds,...allIds.filter(id=>!wantedIds.includes(id))];
  const cart={};
  ordered.slice(0,3).forEach(id=>{
    const qty=Math.min(S.shopInv.filter(i=>i.id===id).length,2);
    if(qty>0)cart[id]=qty;
  });
  if(Object.keys(cart).length<2)return null;
  return{rate:cust.bud,cart};
}

// 도매 수락
function acceptWholesale(){
  const offer=S.wholesaleOffer;
  if(!offer)return;
  const {rate,cart}=offer;
  const totalItems=Object.values(cart).reduce((a,b)=>a+b,0);
  if(totalItems===0){log('⚠️ 판매할 아이템을 1개 이상 선택하세요!');render();return;}
  let total=0;
  const soldItems=[];
  Object.entries(cart).forEach(([id,qty])=>{
    const baseItem=S.shopInv.find(i=>i.id===id);
    if(!baseItem)return;
    const priceEach=Math.round(baseItem.p*rate);
    let rem=qty;
    S.shopInv=S.shopInv.filter(item=>{
      if(item.id===id&&rem>0){rem--;total+=priceEach;soldItems.push({cust:S.cust,item:{...item},price:priceEach,wholesale:true});return false;}
      return true;
    });
  });
  S.todaySalesLog.push(...soldItems);
  S.gold+=total;S.totalRevenue+=total;S.todayRevenue+=total;S.weeklyRevenue+=total;
  S.wholesaleOffer=null;
  changeRapport(S.cust.n,8+soldItems.length);changeRep(2);checkLevelUp();
  const lines=BARGAIN_LINES[S.cust.char]||BARGAIN_LINES['친절'];
  log(`${S.cust.e} 도매 성사! ${lines.accept[Math.floor(Math.random()*lines.accept.length)]} ${soldItems.length}개 총 ${total.toLocaleString()}G`);
  if(S.shopLevel>=5){S.won=true;S.gameOver=true;render();return;}
  S.doneIdxs.add(S.custCurIdx);spawnCust();
}

// 도매 거절 → 개별 판매로 전환
function rejectWholesale(){
  S.wholesaleOffer=null;
  log(`${S.cust.e} 도매 제안 거절. 개별 판매로 전환해요.`);
  render();
}

// 기본가 즉시 판매
function sellAtBase(){
  const item=S.shopInv.find(i=>i.uid===S.selUid);
  if(!item)return;
  S.priceVal=String(item.p);
  trySell();
}

function selItem(u){
  if(S.selUid===u){S.selUid=null;S.priceVal='';S.custOffer=0;}
  else{
    S.selUid=u;
    const item=S.shopInv.find(i=>i.uid===u);
    if(item){
      S.priceVal=String(item.p);
      if(S.cust){
        const isWanted=getCustWants(S.cust,S.shopInv).some(i=>i.uid===u);
        const varRange=(S.cust.budMax-S.cust.bud)*0.5;
        const actualMult=S.cust.bud+Math.random()*varRange+(isWanted?varRange*0.5:0);
        S.custOffer=Math.round(item.p*Math.min(actualMult,S.cust.budMax));
      }
    }
  }
  render();
  const pi=document.getElementById('pin');
  if(pi){pi.focus();pi.select();}
}

function trySell(){
  const item=S.shopInv.find(i=>i.uid===S.selUid);
  if(!item){log('⚠️ 아이템을 선택하세요!');render();return;}
  const price=parseInt(S.priceVal)||0;
  if(!price||price<=0){log('⚠️ 올바른 가격을 입력하세요.');render();return;}
  const isWanted=getCustWants(S.cust,S.shopInv).some(i=>i.uid===S.selUid);
  const maxPay=S.custOffer>0?S.custOffer:Math.round(item.p*(isWanted?S.cust.budMax:S.cust.bud));
  const lines=BARGAIN_LINES[S.cust.char]||BARGAIN_LINES['친절'];
  if(price<=maxPay){
    S.gold+=price;
    S.totalRevenue+=price;
    S.todayRevenue+=price;
    S.weeklyRevenue+=price;
    S.todaySalesLog.push({cust:S.cust,item:{...item},price});
    S.shopInv=S.shopInv.filter(i=>i.uid!==S.selUid);
    S.selUid=null;S.priceVal='';S.custOffer=0;
    const rxn=lines.accept[Math.floor(Math.random()*lines.accept.length)];
    // 가격 비율로 평판/친밀도 계산
    const ratio=price/maxPay;
    const isBargain=ratio>0.95; // 95% 초과 = 거의 한도
    const rapportDelta=isWanted?(isBargain?4:12):(isBargain?3:8);
    const repDelta=ratio<=0.8?3:ratio<=0.95?2:-3; // 싸게 팔수록 평판↑, 바가지치면 ↓
    changeRapport(S.cust.n,rapportDelta);
    changeRep(repDelta);
    checkLevelUp();
    const emoji=ratio>0.95?'🤑':ratio>0.8?'✅':'😄';
    log(`${S.cust.e} "${rxn}" ${emoji} ${price}G! (친밀도+${rapportDelta})`);
    if(S.shopLevel>=5){S.won=true;S.gameOver=true;render();return;}
    S.doneIdxs.add(S.custCurIdx);
    setTimeout(spawnCust,100);
  } else {
    const rxn=lines.reject[Math.floor(Math.random()*lines.reject.length)];
    // 너무 비쌌으면 친밀도/평판 하락
    const over=price/maxPay;
    if(over>1.2){changeRapport(S.cust.n,-5);changeRep(-4);log(`${S.cust.e} "${rxn}" ❌ 🚨 바가지! (최대 ${maxPay}G, 평판↓)`);}
    else{changeRapport(S.cust.n,-2);log(`${S.cust.e} "${rxn}" ❌ (최대 ${maxPay}G)`);}
    render();
  }
}

function skipCust(){
  log(`${S.cust.e}${S.cust.n}이(가) 그냥 나갔습니다.`);
  changeRapport(S.cust.n,-5);
  changeRep(-1);
  S.doneIdxs.add(S.custCurIdx);spawnCust();
}

function endBusiness(){
  const remaining=S.custQueue.length-S.doneIdxs.size;
  S.cust=null;
  for(let i=0;i<S.custQueue.length;i++)S.doneIdxs.add(i);
  S.custsDone=S.doneIdxs.size;
  // 일별 목표 달성 체크
  const dailyGoal=getDailyGoal(S.day,S.shopLevel);
  if(S.todayRevenue>=dailyGoal){
    const bonus=Math.round(dailyGoal*0.05);
    S.gold+=bonus;
    log(`🎯 오늘 목표 달성! 보너스 +${bonus}G`);
  }
  generateTomorrowHints();
  S.showDayReport=true;
  log(`🌙 영업 종료. (남은 손님 ${remaining}명)`);
  render();
}

// 일요일 예약 접수
function takeReservation(custIdx){
  if(S.sunResCount>=MAX_SUN_RESERVATIONS){
    log(`⚠️ 오늘 예약은 최대 ${MAX_SUN_RESERVATIONS}명까지만 받을 수 있어요!`);
    render();return;
  }
  const c=CUSTS[custIdx];
  const nextNonSun=[...Array(7)].map((_,i)=>S.day+1+i).find(d=>!isSunday(d))||S.day+1;
  // 같은 날 동일 아키타입 중복 방지
  const alreadyBooked=S.reservations.some(r=>r.cust.e===c.e&&r.day===nextNonSun);
  if(alreadyBooked){log(`⚠️ ${c.e}${c.n}은 이미 예약됐어요!`);render();return;}
  S.reservations.push({cust:c,day:nextNonSun,wantTags:c.wantTags});
  S.sunResCount++;
  log(`📅 ${c.e}${c.n} 예약 접수! (${S.sunResCount}/${MAX_SUN_RESERVATIONS}) ${nextNonSun}일째 방문 예정.`);
  render();
}

function nextDay(){
  if(S.day>=S.maxDays){S.gameOver=true;render();return;}
  S.day++;
  checkQuestDeadlines();
  // 주가 바뀌면 주간 매출 초기화
  if((S.day-1)%7===0) S.weeklyRevenue=0;
  S.todayRevenue=0;
  S.phase='daytime'; S.phase2='explore';
  S.exploredSlots=[];S.maxExploreSlots=isSunday(S.day)?4:2;
  S.bonusExplore=false;S.sunResCount=0;
  S.cust=null;S.custsDone=0;S.custQueue=[];
  S.doneIdxs=new Set();S.custCurIdx=null;S.previewIdx=null;
  S.selUid=null;S.priceVal='';S.custOffer=0;
  S.showDayReport=false;S.sunDiscoveries=[];S.todaySalesLog=[];
  // 오늘 예약 손님 세팅
  S.todayReservations=S.reservations.filter(r=>r.day===S.day);
  const dow=getDayOfWeek(S.day);
  const sunMsg=isSunday(S.day)?'☀️ 오늘은 일요일! 탐험을 4번 갈 수 있고, 특별 탐험지가 열려요.':'';
  log(`🌅 ${S.day}일째(${dow}요일)가 밝았습니다! ${sunMsg}`);
  render();
}

function setTab(t){
  if(S.phase==='shop'&&!S.showDayReport&&t!=='trend')return;
  if(S.showDayReport&&t!=='report')S.showDayReport=false;

function toggleDrawer(tab){

function renderDrawerQuest(){
  const active=S.activeQuests.filter(q=>q.status==='active');
  const done=S.activeQuests.filter(q=>q.status==='done');
  const failed=S.activeQuests.filter(q=>q.status==='failed');

  if(S.activeQuests.length===0){
    return `<div class="empty" style="padding:20px 0">아직 의뢰가 없어요.<br>단골 손님(친밀도 75+)이 되면 특별 의뢰를 받을 수 있어요!</div>`;
  }

  const renderQ=(q,type)=>{
    const pct=Math.round(q.delivered/q.qty*100);
    const daysLeft=q.deadline-S.day;
    const urgent=daysLeft<=1&&type==='active';
    const have=S.shopInv.filter(i=>i.id===q.itemId).length;
    return `<div class="quest-row${type==='active'?' active':type==='done'?' done':' failed'}">
      <div class="quest-head">
        <span style="font-size:20px">${q.custE}</span>
        <div style="flex:1">
          <div style="font-size:12px;font-weight:800">${q.custName}의 의뢰</div>
          <div style="font-size:11px;color:var(--text2)">${q.itemE}${q.itemN} ${q.qty}개 납품</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;font-weight:800;color:var(--gold)">${q.reward.toLocaleString()}G</div>
          ${type==='active'?`<div style="font-size:10px;color:${urgent?'var(--red)':'var(--text3)'}">D-${daysLeft}일${urgent?' ⚠️':''}</div>`:''}
          ${type==='done'?`<div style="font-size:10px;color:var(--green)">✅ 완료</div>`:''}
          ${type==='failed'?`<div style="font-size:10px;color:var(--red)">❌ 실패</div>`:''}
        </div>
      </div>
      ${type==='active'?`
        <div style="display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text3);margin-bottom:4px">
          <span>진행: ${q.delivered}/${q.qty}개</span>
          <span>·</span>
          <span>현재 보유: ${have}개</span>
        </div>
        <div class="quest-prog-bar"><div class="quest-prog-fill" style="width:${pct}%"></div></div>
        ${have>0?`<button class="btn btn-sm btn-sun" style="margin-top:7px" onclick="deliverQuest('${q.id}')">📦 납품하기 (${Math.min(have,q.qty-q.delivered)}개)</button>`:''}
      `:''}
    </div>`;
  };

  return `<div class="quest-list">
    ${active.map(q=>renderQ(q,'active')).join('')}
    ${done.map(q=>renderQ(q,'done')).join('')}
    ${failed.map(q=>renderQ(q,'failed')).join('')}
    <div style="font-size:10px;color:var(--text3);text-align:center;padding-top:2px">
      의뢰는 친밀도 75(VIP) 달성 시 자동 생성됩니다
    </div>
  </div>`;
}

function renderTabs(){
  const sun=isSunday(S.day);
  const p=S.phase2;
  const explCnt=S.exploredSlots.length;
  const maxSlots=sun?(4):(S.bonusExplore?3:2);
  const tabs=[
    {id:'explore', l:`🗺️ 탐험${explCnt>0?` (${explCnt}/${maxSlots})`:''}` },
    {id:'craft',   l:'⚗️ 제조'},
    {id:'shop',    l:sun?'📅 예약':'🏪 상점'},
  ];
  return `<div class="tabs">${tabs.map(x=>{
    const isA=p===x.id||(S.phase==='shop'&&x.id==='shop'&&!S.showDayReport);
    const isDone=(x.id==='explore'&&explCnt>=maxSlots&&p!=='explore'&&!S.showDayReport)||
                 (x.id==='craft'&&S.phase==='shop'&&!S.showDayReport);
    const locked=(S.phase==='shop'&&!S.showDayReport)&&x.id!=='shop';
    let cls=isA?'tab-active':isDone?'tab-done':'tab-idle';
    if(locked)cls+=' tab-locked';
    return `<div class="tab ${cls}" ${!locked?`onclick="setTab('${x.id}')"`:''}>
      ${isDone?'✓ ':''}${x.l}</div>`;
  }).join('')}</div>`;
}

function renderMain(){
  if(S.showDayReport)return renderDayReport();
  if(S.phase==='shop')return renderShop();
  if(S.phase2==='craft')return renderCraft();
  if(isSunday(S.day)&&S.phase2==='shop')return renderSundayReservation();
  return renderExplore();
}

        <div style="display:flex;gap:2px;flex-wrap:wrap">${tomorrow.hot.map(t=>tb(t,true)).join('')}</div>
      </div>
    </div>

    <!-- 추천 아이템 한 줄 -->
    ${hotRec.length?`<div style="display:flex;align-items:center;gap:6px;padding:5px 9px;background:var(--gold-light);border:1px solid var(--border2);border-radius:var(--radius-sm)">
      <span style="font-size:11px;flex-shrink:0">💡</span>
      <div style="display:flex;gap:5px;flex-wrap:wrap;flex:1;min-width:0">
        ${hotRec.map(r=>`<span style="font-size:10px;font-weight:700">${r.e}${r.n} <span style="color:var(--gold2)">${r.p}G</span></span>`).join('<span style="color:var(--border2)">·</span>')}
      </div>
    </div>`:''}

  </div>`;}

// ===== 탐험 렌더 =====
function renderLocCard(loc, slotIdx, isSun){
  const slotInfo=getSlotInfo(slotIdx,isSun);
  const bonus=getSlotBonus(loc,slotIdx,isSun);
  const isSpecial=!!loc.special;
  const isSpecialTime=!!slotInfo.isSpecialTime;
  const isDawn=isSun&&slotIdx===0;
  const isEve=(isSun&&slotIdx===3)||(!isSun&&slotIdx===2);
  const dropIngrs=loc.pool.slice(0,4).map(id=>INGR.find(i=>i.id===id)).filter(Boolean);
  const bonusIngrs=bonus.ids.map(id=>INGR.find(i=>i.id===id)).filter(Boolean);

  const bonusDesc=`${slotInfo.label}: ${bonusIngrs.map(i=>i.e+i.n).join('/')} +${bonus.qty[0]}~${bonus.qty[1]}개`;

  // 다른 시간대 힌트
  const availSlots=isSun?SUNDAY_SLOTS:(!isSun&&S.bonusExplore?[...WEEKDAY_SLOTS,BONUS_NIGHT_SLOT]:WEEKDAY_SLOTS);
  const otherBonus=availSlots.filter(s=>s.idx!==slotIdx).map(s=>{
    const ob=getSlotBonus(loc,s.idx,isSun);
    const oi=ob.ids.slice(0,2).map(id=>{const i=INGR.find(x=>x.id===id);return i?i.e:'';}).join('');
    return `${s.badge} ${oi}`;
  }).join(' · ');

  // 특수 시간대 전용 드랍 표시
  const exclusiveDrop=isDawn
    ?`<div style="font-size:9px;font-weight:800;color:#283593;background:#E8EAF6;border-radius:5px;padding:2px 6px;margin-top:3px;display:inline-block">🌫️ 새벽이슬 드랍 (70%)</div>`
    :isEve
    ?`<div style="font-size:9px;font-weight:800;color:#6A1B9A;background:#F3E5F5;border-radius:5px;padding:2px 6px;margin-top:3px;display:inline-block">🌇 황혼석 드랍 (70%)</div>`
    :'';

  return `<div class="loc-card${isSpecial?' special':''}" onclick="doExplore('${loc.id}',${slotIdx})">
    <span class="loc-bonus-badge" style="background:${slotInfo.bg};color:${slotInfo.color};border:1px solid ${slotInfo.color}">${slotInfo.badge}${isSpecial?' ✨':''}${isSpecialTime?' ⭐':''}</span>
    <div class="loc-top"><span class="loc-e">${loc.e}</span><span class="loc-name">${loc.n}</span></div>
    <div class="loc-desc">${loc.desc}</div>
    <div class="loc-drops" style="margin-bottom:5px">
      ${dropIngrs.map(i=>`<span class="loc-drop loc-drop-${RKCLS[i.r].replace('tag-','')}">${i.e}${i.n}</span>`).join('')}
    </div>
    <div style="font-size:10px;font-weight:700;color:${slotInfo.color};background:${slotInfo.bg};border-radius:5px;padding:3px 7px;margin-bottom:2px">${bonusDesc}${isSpecialTime?' · 희귀↑↑':''}</div>
    ${exclusiveDrop}
    <div style="font-size:9px;color:var(--text3);padding:1px 2px;margin-top:2px">${otherBonus}</div>
  </div>`;
}

function renderExplore(){
  const sun=isSunday(S.day);
  const baseSlots=sun?SUNDAY_SLOTS:WEEKDAY_SLOTS;
  const slots=(!sun&&S.bonusExplore)?[...WEEKDAY_SLOTS,BONUS_NIGHT_SLOT]:baseSlots;
  const maxSlots=sun?4:(S.bonusExplore?3:2);
  const doneSlots=new Set(S.exploredSlots.map(s=>s.slot));
  const locs=sun?[...LOCATIONS,...SUN_LOCATIONS]:LOCATIONS;
  const curSlotIdx=S.exploredSlots.length; // 다음 탐험할 슬롯
  const curSlot=slots[curSlotIdx];

  const resultHtml=S.exploredSlots.map(s=>{
    const si=getSlotInfo(s.slot,sun);
    const loc=locs.find(l=>l.id===s.locId)||{e:'🗺️',n:''};
    return `<div class="exp-result">
      <div class="exp-result-hdr">
        <span style="color:${si.color};font-weight:800">${si.label}</span> · ${loc.e} ${loc.n}
      </div>
      <div class="found-row">
        ${s.found.map(i=>`<span class="found-chip${i.isBonus?' bonus':i.isSpecialDrop?' special':''}">${i.isBonus?'⭐':i.isSpecialDrop?'✨':''}${i.e}${i.n} ×${i.qty}</span>`).join('')}
        ${s.discovery?`<span class="found-chip special">📜 ${s.discovery.recipe.n} 발견!</span>`:''}
      </div>
    </div>`;
  }).join('');

  return `<div class="panel" style="padding:14px;">
    ${sun?`<div class="sunday-banner" style="margin-bottom:12px">
      <div class="sunday-title">☀️ 일요일 자유 탐험</div>
      <div style="font-size:11px;color:var(--sun);margin-top:2px">새벽·아침·오후·저녁 4번 탐험 가능! 특별 탐험지에서 희귀 레시피를 발견할 수 있어요.</div>
    </div>`:''}

    <!-- 시간대 진행 표시 -->
    <div style="display:flex;gap:6px;margin-bottom:12px;justify-content:center;flex-wrap:wrap">
      ${slots.map(s=>{
        const done=doneSlots.has(s.idx);
        const isCur=s.idx===curSlotIdx&&curSlotIdx<maxSlots;
        return `<div style="display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:12px;font-size:11px;font-weight:800;
          background:${done?s.bg:isCur?s.bg:'var(--bg3)'};
          color:${done?s.color:isCur?s.color:'var(--text3)'};
          border:1.5px solid ${done?s.color:isCur?s.color:'var(--border)'};
          opacity:${done||isCur?1:0.5}">
          ${done?'✓ ':''}${s.label}${isCur?' ◀':''}
        </div>`;
      }).join('')}
    </div>

    ${resultHtml}

    ${curSlotIdx<maxSlots?`
      <div style="font-size:12px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:6px">
        <span style="background:${curSlot.bg};color:${curSlot.color};border:1.5px solid ${curSlot.color};border-radius:10px;padding:3px 10px;font-size:11px">${curSlot.label}</span>
        <span style="color:var(--text3);font-size:11px">${curSlot.desc}</span>
      </div>
      <div class="loc-grid">
        ${locs.map(loc=>renderLocCard(loc,curSlotIdx,sun)).join('')}
      </div>
    `:''}

    ${curSlotIdx>0?`
      <div class="btn-row">
        ${sun?`
          ${curSlotIdx>=maxSlots?`
            <button class="btn" onclick="skipShopNextDay()">🌙 오늘 마무리 · 다음 날로 →</button>
          `:''}
          <button class="btn btn-gold" onclick="setTab('craft')">⚗️ 제조하러 가기 →</button>
        `:`
          ${curSlotIdx>=2&&!S.bonusExplore?`
            <button class="btn" style="border-color:var(--sun);color:var(--sun)" onclick="activateBonusExplore()">🗺️ 한 번 더 탐험 (상점 포기)</button>
          `:''}
          ${S.bonusExplore&&curSlotIdx>=maxSlots?`
            <button class="btn" onclick="skipShopNextDay()">🌙 다음 날로 →</button>
          `:''}
          <button class="btn btn-gold" onclick="setTab('craft')">⚗️ 제조하러 가기 →</button>
        `}
      </div>
    `:''}
  </div>`;
}

// ===== 제조 렌더 =====
function renderCraft(){
  const cat=S.craftCat||'all';
  const curLv=S.shopLevel||1;
  const recipes=allRecipes();
  // 현재 레벨 이하만 표시 (잠긴 것도 표시하되 구분)
  const filtered=(cat==='all'?recipes:recipes.filter(r=>r.cat===cat))
    .sort((a,b)=>(a.unlockLv||1)-(b.unlockLv||1));
  const craftable=recipes.filter(r=>canCraft(r,S.ingInv)&&(r.unlockLv||1)<=curLv);
  const crafted=S.shopInv.length;

  // 다음 레벨에서 해금될 레시피 수
  const nextLvUnlock=recipes.filter(r=>(r.unlockLv||1)===curLv+1).length;

  const lvColors=['','#2D6A2D','#1565C0','#7B1FA2','#E65100','#B8860B'];
  const lvLabels=['','Lv1','Lv2','Lv3','Lv4','Lv5'];

  return `<div class="panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div class="sec" style="margin-bottom:0">제조 (진열 ${crafted}개 · 제조가능 ${craftable.length}종)</div>
      ${nextLvUnlock>0?`<div style="font-size:10px;color:var(--text3)">🔒 다음 레벨 해금 ${nextLvUnlock}종</div>`:''}
    </div>
    <div class="cat-tabs">
      ${CAT_DEFS.filter(c=>c.id==='all'||recipes.some(r=>r.cat===c.id)).map(c=>`
        <div class="cat-tab${cat===c.id?' active':''}" onclick="S.craftCat='${c.id}';render()">
          ${c.label}${c.id!=='all'?` <span style="opacity:.7">(${(c.id==='all'?recipes:recipes.filter(r=>r.cat===c.id)).filter(r=>canCraft(r,S.ingInv)&&(r.unlockLv||1)<=curLv).length})</span>`:''}
        </div>
      `).join('')}
    </div>
    <div class="craft-list">
      ${filtered.length===0?`<div class="empty">해당 카테고리 레시피 없음</div>`:filtered.map(r=>{
        const rLv=r.unlockLv||1;
        const locked=rLv>curLv;
        const ok=!locked&&canCraft(r,S.ingInv);
        const maxQ=locked?0:maxCraftable(r,S.ingInv);
        const curQty=Math.max(1,Math.min(S.craftQty[r.id]||1,Math.max(1,maxQ)));
        const isSpecial=!!r.sunOnly;

        if(locked){
          return `<div class="craft-row" style="opacity:.45;filter:grayscale(.6)">
            <span class="craft-emoji" style="filter:grayscale(1)">${r.e}</span>
            <div class="craft-info">
              <div class="craft-name" style="color:var(--text3)">
                🔒 ${r.n}
                <span style="font-size:9px;padding:1px 6px;border-radius:8px;background:${lvColors[rLv]}22;color:${lvColors[rLv]};border:1px solid ${lvColors[rLv]};font-weight:800">${lvLabels[rLv]} 해금</span>
              </div>
              <div style="font-size:10px;color:var(--text3);margin-top:2px">${SHOP_LEVELS[rLv-1]?.name||''}에서 해금됩니다</div>
            </div>
            <div class="craft-price" style="color:var(--text3)">${r.p}G</div>
            <div class="craft-qty-wrap">
              <span style="font-size:10px;color:var(--text3)">잠김</span>
            </div>
          </div>`;
        }

        return `<div class="craft-row${ok?' can':''}${isSpecial?' special-recipe':''}">
          <span class="craft-emoji">${r.e}</span>
          <div class="craft-info">
            <div class="craft-name">
              ${r.n}
              ${isSpecial?`<span class="chip chip-sun">✨특별</span>`:''}
              ${rLv>1?`<span style="font-size:9px;padding:1px 5px;border-radius:8px;background:${lvColors[rLv]}22;color:${lvColors[rLv]};border:1px solid ${lvColors[rLv]};font-weight:800">${lvLabels[rLv]}</span>`:''}
            </div>
            <div class="craft-cost">${(()=>{
              const rawParts=Object.entries(r.cost||{}).map(([id,q])=>{
                const ing=byId(INGR,id);if(!ing)return'';
                const have=S.ingInv[id]||0;
                const need=q*(ok?curQty:1);
                const ok2=have>=need;
                return `<span style="font-size:10px;font-weight:700;color:${ok2?'var(--text3)':'var(--red)'}">${ing.e}${ing.n}×${need}${ok2?'':` (${have}개)`}</span>`;
              });
              const craftedParts=Object.entries(r.craftedCost||{}).map(([cid,q])=>{
                const ri=byId(allRecipes(),cid);if(!ri)return'';
                const have=S.shopInv.filter(s=>s.id===cid).length;
                const need=q*(ok?curQty:1);
                const ok2=have>=need;
                return `<span class="craft-mat-item${ok2?'':' miss'}">${ri.e}${ri.n} ×${need}${ok2?'':` (${have}개)`}</span>`;
              });
              return [...rawParts,...craftedParts].join(' ');
            })()}</div>
            <div class="craft-tags">${r.tags.map(t=>`<span class="chip">${t}</span>`).join('')}</div>
          </div>
          <div class="craft-price">${r.p}G</div>
          <div class="craft-qty-wrap">
            <span style="font-size:9px;color:${ok?'var(--green)':'var(--text3)'};font-weight:700">
              최대 ${maxQ}개
            </span>
            ${ok&&maxQ>1?`
              <input type="range" class="craft-slider" min="1" max="${maxQ}" value="${curQty}"
                oninput="setCraftQty('${r.id}',this.value)">
              <div class="craft-qty-row">
                <button class="btn btn-sm" style="padding:3px 7px" onclick="setCraftQty('${r.id}',Math.max(1,(S.craftQty['${r.id}']||1)-1))">−</button>
                <span class="craft-qty-num">${curQty}</span>
                <button class="btn btn-sm" style="padding:3px 7px" onclick="setCraftQty('${r.id}',Math.min(${maxQ},(S.craftQty['${r.id}']||1)+1))">＋</button>
              </div>
            `:`<span style="font-size:10px;color:var(--text3)">×${ok?curQty:1}</span>`}
            <button class="btn btn-sm${ok?' btn-purple':''}" ${ok?'':'disabled'} onclick="doCraft('${r.id}')">
              ${ok?`⚗️ ×${curQty} 제조`:'재료 부족'}
            </button>
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="btn-row">
      ${S.exploredSlots.length<(isSunday(S.day)?4:2)?`<button class="btn" onclick="setTab('explore')">← 탐험하기</button>`:''}
      ${!S.bonusExplore?`<button class="btn" onclick="skipShopNextDay()">🌙 영업 건너뛰고 다음 날로</button>`:''}
      ${!S.bonusExplore?`<button class="btn btn-gold" onclick="openShop()">🏪 상점 열기 (${crafted}개 진열)</button>`:`<button class="btn" onclick="skipShopNextDay()">🌙 다음 날로 →</button>`}
    </div>
  </div>`;
}

// ===== 손님 큐 패널 =====
function renderQueuePanel(){
  const q=S.custQueue;
  if(!q||q.length===0)return'';
  const doneCount=S.doneIdxs.size,waitCount=q.length-doneCount;
  const bigSpenderIdx=getBigSpender();

  const rows=q.map((c,i)=>{
    const isDone=S.doneIdxs.has(i),isCur=i===S.custCurIdx&&S.cust,isPrev=S.previewIdx===i;
    const wanted=getCustWants(c,S.shopInv);
    const isBig=i===bigSpenderIdx&&!isDone;
    const isWholesale=c.bud<1.0;
    let cls='qrow';
    if(isDone)cls+=' qrow-done';else if(isCur)cls+=' qrow-current';else if(isPrev)cls+=' qrow-preview';
    return `<div class="${cls}" ${(!isDone&&!isCur)?`onclick="setPreview(${i})"`:''}>
      <span class="qrow-e">${c.e}</span>
      <div class="qrow-info">
        <div class="qrow-name">
          ${c.n}
          ${isBig?`<span style="font-size:9px;font-weight:800;background:#FFF3CC;color:#7A4500;border:1px solid #E8C840;border-radius:8px;padding:1px 6px">👑 큰손</span>`:''}
          ${isWholesale&&!isDone?`<span style="font-size:9px;font-weight:800;background:var(--blue-light);color:var(--blue);border:1px solid #90CAF9;border-radius:8px;padding:1px 6px">🛒 도매</span>`:''}
        </div>
        <div class="qrow-tags">${c.wantTags.join(' · ')} · ${c.char}</div>
        ${wanted.length>0&&!isDone?`<div class="qrow-match">${wanted.slice(0,2).map(it=>`<span style="font-size:9px;background:var(--gold-light);border:1px solid var(--border2);border-radius:6px;padding:1px 5px;color:var(--gold2);font-weight:700">${it.e}${it.n}</span>`).join('')}${wanted.length>2?`<span style="font-size:9px;color:var(--text3)">+${wanted.length-2}</span>`:''}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        <span class="qrow-status ${isDone?'status-done':isCur?'status-cur':'status-wait'}">${isDone?'✓':isCur?'▶':`${i+1}`}</span>
        ${(!isDone&&!isCur)?`<button class="btn btn-sm btn-purple" style="padding:3px 7px;font-size:10px" onclick="event.stopPropagation();jumpToCust(${i})">↩먼저</button>`:''}
      </div>
    </div>`;
  }).join('');

  // 미리보기: 중복 없이 예상가 상위 아이템만
  let previewHtml='';
  if(S.previewIdx!==null&&!S.doneIdxs.has(S.previewIdx)&&S.previewIdx!==S.custCurIdx){
    const pc=S.custQueue[S.previewIdx];
    const isBigPrev=S.previewIdx===bigSpenderIdx;
    const items=S.shopInv.map(item=>{
      const r=byId(allRecipes(),item.id);
      const isW=r&&r.tags&&r.tags.some(t=>pc.wantTags.includes(t));
      return{...item,isW,est:Math.round(item.p*(isW?pc.budMax:pc.bud))};
    }).sort((a,b)=>b.est-a.est).slice(0,4);
    previewHtml=`<div class="preview-panel">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
        <span style="font-size:16px">${pc.e}</span>
        <span style="font-size:11px;font-weight:800;color:var(--gold2)">${pc.n} 예상 구매가</span>
        ${isBigPrev?`<span style="font-size:9px;font-weight:800;background:#FFF3CC;color:#7A4500;border:1px solid #E8C840;border-radius:8px;padding:1px 6px">👑 큰손</span>`:''}
      </div>
      <div class="preview-items">
        ${items.map(it=>`<div class="preview-item${it.isW?' best':''}">
          ${it.e}${it.n} <b style="color:var(--gold2)">~${it.est}G</b>${it.isW?' ★':''}
        </div>`).join('')}
      </div>
    </div>`;
  }

  return `${previewHtml}
    <div class="qpanel">
      <div class="qpanel-hdr" onclick="toggleQueue()">
        <div class="qpanel-hdr-left">👥 오늘 손님 <span style="background:var(--purple-light);color:var(--purple);border-radius:8px;padding:1px 7px;font-size:10px">${waitCount}명 대기 · ${doneCount}명 완료</span>
        ${bigSpenderIdx>=0?`<span style="font-size:9px;font-weight:800;background:#FFF3CC;color:#7A4500;border:1px solid #E8C840;border-radius:8px;padding:1px 6px;margin-left:4px">👑 ${S.custQueue[bigSpenderIdx].n}</span>`:''}
        </div>
        <span style="font-size:11px;color:var(--text3)">${S.queueOpen?'▲':'▼'}</span>
      </div>
      ${S.queueOpen?`<div class="qpanel-body"><div class="qlist">${rows}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:6px;text-align:center">클릭→예상가 확인 · [↩먼저]→순서변경</div>
      </div>`:''}
    </div>`;
}

// ===== 상점 렌더 =====
function renderShop(){
  const sun=isSunday(S.day);
  if(!S.cust&&!S.showDayReport){
    // 영업 종료 후 → 리포트로
    return renderDayReport();
  }
  const wantedItems=getCustWants(S.cust||{wantTags:[]},S.shopInv);
  const wantedUids=new Set(wantedItems.map(i=>i.uid));
  const selItem=S.shopInv.find(i=>i.uid===S.selUid);

  return `
    ${renderQueuePanel()}
    <div class="panel">
      <div class="custcard">
        <div class="chead">
          <span class="ce">${S.cust.e}</span>
          <div style="flex:1">
            <div class="cn">${S.cust.n}${S.todayReservations.some(r=>r.cust===S.cust)?'<span style="font-size:10px;background:#E3F2FD;color:#1565C0;border-radius:6px;padding:1px 6px;margin-left:5px">📅예약</span>':''}</div>
            <div class="cnote">${S.cust.note}</div>
            <div style="margin-top:3px">${S.cust.wantTags.map(t=>`<span class="chip">${t}</span>`).join('')}</div>
          </div>
          <div style="text-align:right;font-size:11px;color:var(--text3)">${S.doneIdxs.size}/${S.maxCusts}명</div>
        </div>
        ${wantedItems.length>0
          ?`<div class="cbubble">⭐ ${wantedItems.slice(0,3).map(i=>`${i.e}${i.n}`).join(', ')}${wantedItems.length>3?' 외 '+(wantedItems.length-3)+'개':''}</div>`
          :'<div class="cbubble">특별히 원하는 게 없는 것 같아요.</div>'}

  return `<div class="panel">

      <span style="float:right;font-size:10px;color:${resLeft>0?'var(--text3)':'var(--red)'}">남은 예약 ${resLeft}/${MAX_SUN_RESERVATIONS}</span>

// ===== 흥정 게이지 =====
function renderBargainMeter(price, maxPay, baseP){
  if(!price||!maxPay)return`<div style="font-size:11px;color:var(--text3)">금액을 입력하면 분석이 표시됩니다.</div>`;
  const pct=Math.round(price/maxPay*100);
  const clampedPct=Math.min(pct,150); // 바 표시용 cap
  const barW=Math.min(clampedPct,100); // 바 너비 max 100%

  // 구간별 색상·이모지·메시지
  let barColor,emoji,warnCls,warnMsg;
  if(pct<=0){
    barColor='#ccc';emoji='❓';warnCls='bm-low';warnMsg='가격을 입력해 주세요.';
  } else if(pct<=60){
    barColor='#42A5F5';emoji='😅';warnCls='bm-low';
    warnMsg=`많이 싸게 파는 거예요! 기준가(${baseP}G)의 ${Math.round(price/baseP*100)}%입니다.`;
  } else if(pct<=85){
    barColor='#66BB6A';emoji='🙂';warnCls='bm-ok';
    warnMsg='적정 가격이에요. 손님이 흔쾌히 살 것 같아요.';
  } else if(pct<=100){
    barColor='#FFA726';emoji='😤';warnCls='bm-ok';
    warnMsg=`손님 한도의 ${pct}%. 아슬아슬하지만 거래될 거예요!`;
  } else if(pct<=120){
    barColor='#EF5350';emoji='😠';warnCls='bm-high';
    warnMsg=`⚠️ 한도 초과 ${pct}%! 손님이 거절할 거예요.`;
  } else {
    barColor='#B71C1C';emoji='🤬';warnCls='bm-over';
    warnMsg=`🚨 완전 바가지! 한도의 ${pct}%로 손님이 화낼 수 있어요.`;
  }

  // 게이지 내 마커 위치 (100% 위치)
  const markerLeft=Math.min(100,Math.round(100/Math.min(clampedPct+20,150)*100));

  return `
    <div class="bm-row">
      <span class="bm-emoji">${emoji}</span>
      <div class="bm-label">내 가격: <b>${price.toLocaleString()}G</b> / 손님 한도: ~${maxPay.toLocaleString()}G</div>
      <span class="bm-pct" style="color:${pct>100?'var(--red)':pct>85?'var(--sun)':'var(--green)'}">${pct}%</span>
    </div>
    <div class="bm-bar-bg">
      <div class="bm-bar-fill" style="width:${barW}%;background:${barColor}"></div>
      <div class="bm-mark" style="left:${Math.min(95,Math.round(maxPay/(maxPay*1.5)*100))}%"></div>
    </div>
    <div class="bm-zones">
      <div class="bm-zone" style="width:60%">💙 저렴</div>
      <div class="bm-zone" style="width:25%">💚 적정</div>
      <div class="bm-zone" style="width:15%">🔴 초과</div>
    </div>
    <div class="bm-warn ${warnCls}">${warnMsg}</div>
  `;
}

     msg:'상점이 문을 닫았어요. 하지만 포기하지 마세요!'},
    {lv:2,emoji:'🙂',title:'동네에서 알아주는 상점',color:'var(--blue)',
     msg:'마을 사람들이 당신의 상점을 기억하기 시작했어요.'},
    {lv:3,emoji:'⭐',title:'인기 있는 상점주',color:'var(--gold)',
     msg:'많은 손님들이 단골이 되었고, 상점이 번창하고 있어요!'},
    {lv:4,emoji:'💎',title:'명품 상점의 주인',color:'var(--purple)',
     msg:'이 지역 최고의 상점으로 소문이 났어요. 대단해요!'},
    {lv:5,emoji:'👑',title:'전설의 상점주!',color:'var(--gold)',
     msg:'당신의 상점은 이제 전설이 되었습니다. 완벽한 결말이에요!'},
  ];
  const ending=ENDINGS[Math.min(lv-1, ENDINGS.length-1)];
  const isMaxEnd=lv>=5;

  return `<div class="panel over">
    <div class="over-emoji">${ending.emoji}</div>
    <div class="over-title" style="color:${ending.color}">${ending.title}</div>
    <div class="over-sub">
      ${ending.msg}<br><br>
      <b>${S.maxDays}일간의 기록</b><br>
      💰 보유 금액: ${S.gold.toLocaleString()}G<br>
      📈 누적 매출: ${S.totalRevenue.toLocaleString()}G<br>
      ${lv>=2?`👥 단골 손님: ${Object.entries(S.rapport).filter(([,v])=>v>=50).length}명<br>`:''}
      ${isMaxEnd?'<br>🎊 모든 레벨을 달성했습니다!':''}
      ${!isMaxEnd?`<br>💡 다음엔 <b>${SHOP_LEVELS[lv]?.name||''}</b>까지 도전해보세요!`:''}
    </div>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      ${!isMaxEnd?`<button class="btn btn-gold btn-lg" onclick="restartGame()">🔄 다시 도전</button>`:''}
      <button class="btn ${isMaxEnd?'btn-gold btn-lg':'btn'}" onclick="restartGame()">
        ${isMaxEnd?'🔄 새 게임':'↩ 처음부터'}
      </button>
    </div>
  </div>`;
}

// ===== 저장/불러오기 =====
const SAVE_KEY='kkyu_shop_save';

function saveGame(){
  try{
    const data={
      S:{...S,
        doneIdxs:[...S.doneIdxs],   // Set → Array
      },
      unlockedSpecial:[...unlockedSpecial],
    };
    localStorage.setItem(SAVE_KEY,JSON.stringify(data));
  }catch(e){console.warn('저장 실패:',e);}
}

function loadGame(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw)return false;
    const data=JSON.parse(raw);
    S={...newState(),...data.S,
      doneIdxs:new Set(data.S.doneIdxs||[]),
    };
    unlockedSpecial=new Set(data.unlockedSpecial||[]);
    return true;
  }catch(e){
    console.warn('불러오기 실패:',e);
    localStorage.removeItem(SAVE_KEY);
    return false;
  }
}

function resetGame(){
  if(!confirm('저장 데이터를 삭제하고 처음부터 시작할까요?'))return;
  localStorage.removeItem(SAVE_KEY);
  unlockedSpecial=new Set();
  S=newState();
  render();
}

function render(){
  const el=document.getElementById('G');
  if(!el)return;
  saveGame(); // 매 렌더마다 자동저장
  if(S.gameOver){el.innerHTML=renderOver();return;}
  const sun=isSunday(S.day);
  const mainHtml=S.showDayReport?renderDayReport():
                 S.phase==='shop'?renderShop():
                 S.phase2==='craft'?renderCraft():
                 (sun&&S.phase2==='shop')?renderSundayReservation():
                 renderExplore();
  el.innerHTML=`
    ${renderHdr()}
    ${renderTabs()}
    ${mainHtml}
    <div class="bot">${renderIngInv()}${renderLog()}</div>
    <div style="text-align:center;padding:8px 0 4px">
      <button class="btn btn-sm" style="font-size:10px;color:var(--text3);opacity:.6" onclick="resetGame()">🗑️ 처음부터</button>
    </div>
  `;
  const pi=document.getElementById('pin');
  if(pi){
    pi.value=S.priceVal;
    pi.oninput=e=>{S.priceVal=e.target.value;updateBargainMeter();};
    pi.onkeydown=e=>{if(e.key==='Enter')trySell();};
    pi.focus();pi.select();
  }
}

// 게임 오버/재시작 시 저장 초기화
function restartGame(){
  localStorage.removeItem(SAVE_KEY);
  unlockedSpecial=new Set();
  S=newState();
  render();
}

// 시작: 저장된 데이터 있으면 불러오기, 없으면 새 게임
const loaded=loadGame();
render();
</script>
